# Robot simulation stack (ROS 2 Jazzy + Gazebo Sim Harmonic):
# input source -> TCP -> ROS Bridge -> DDS -> control logic -> gazebo.
#
# The command source (keyboard today, a SoftPLC later) is decoupled from ROS 2
# by a TCP boundary: it speaks JSON Lines to the ros_bridge service, which is
# the single DDS publisher of /cmd_vel. ROS 2 itself is masterless - the ROS
# nodes (ros_bridge, control_logic, gazebo) discover each other over DDS on the
# shared ros_net using the same ROS_DOMAIN_ID.
services:
  # ---------------------------------------------------------------- #
  # ROS Bridge - TCP (JSON Lines) server -> /cmd_vel (Twist) on DDS.
  #   Port 9090 is published so external clients (e.g. a SoftPLC) can connect.
  # ---------------------------------------------------------------- #
  ros_bridge:
    build: ./ros_bridge
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - BRIDGE_PORT=9090
    ports:
      - "9090:9090"
    networks:
      - ros_net

  # ---------------------------------------------------------------- #
  # Keyboard Controller - keyboard/scenario -> JSON over TCP -> ros_bridge.
  #   ROS-free TCP client. Needs stdin/tty to capture keystrokes.
  # ---------------------------------------------------------------- #
  keyboard_controller:
    build: ./keyboard_input
    environment:
      - BRIDGE_HOST=ros_bridge
      - BRIDGE_PORT=9090
    depends_on:
      - ros_bridge
    networks:
      - ros_net
    stdin_open: true
    tty: true
    volumes:
      - ./scenarios:/app/scenarios

  # ---------------------------------------------------------------- #
  # Control Logic - /cmd_vel -> safety constraints -> /gazebo/cmd_vel.
  # ---------------------------------------------------------------- #
  control_logic:
    build: ./control_logic
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
    networks:
      - ros_net

  # ---------------------------------------------------------------- #
  # Gazebo Simulator - subscribes /gazebo/cmd_vel, runs physics + web UI.
  #   Built from gazebo_simulator/Dockerfile: Gazebo Harmonic + ROS 2 Jazzy +
  #   ros_gz bridge + noVNC web UI (the entrypoint launches all of them).
  # ---------------------------------------------------------------- #
  gazebo:
    build: ./gazebo_simulator
    environment:
      - ROS_DOMAIN_ID=${ROS_DOMAIN_ID:-42}
      - WORLD_FILE=/root/.gazebo/worlds/empty.world
    ports:
      - "8080:8080"
    volumes:
      - ./gazebo_simulator/models:/root/.gazebo/models
      - ./gazebo_simulator/worlds:/root/.gazebo/worlds
    networks:
      - ros_net

networks:
  ros_net:
    driver: bridge
