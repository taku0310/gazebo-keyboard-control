# Robot simulation stack (ROS 2 Jazzy + Gazebo Sim Harmonic):
# keyboard -> control logic -> gazebo.
#
# ROS 2 is masterless: nodes discover each other over DDS on the shared
# ros_net bridge as long as they use the same ROS_DOMAIN_ID. There is no
# roscore/ROS Master container and no startup-ordering requirement.
services:
  # ---------------------------------------------------------------- #
  # Keyboard Controller - keyboard input -> /cmd_vel (Twist).
  #   Needs stdin/tty to capture keystrokes.
  # ---------------------------------------------------------------- #
  keyboard_controller:
    build: ./keyboard_input
    environment:
      - ROS_DOMAIN_ID=42
    networks:
      - ros_net
    stdin_open: true
    tty: true
    volumes:
      - ./scenarios:/app/scenarios

  # ---------------------------------------------------------------- #
  # Control Logic - /cmd_vel -> safety constraints -> /gazebo/cmd_vel.
  # ---------------------------------------------------------------- #
  control_logic:
    build: ./control_logic
    environment:
      - ROS_DOMAIN_ID=42
    networks:
      - ros_net

  # ---------------------------------------------------------------- #
  # Gazebo Simulator - subscribes /gazebo/cmd_vel, runs physics + web UI.
  #   Built from gazebo_simulator/Dockerfile: Gazebo Harmonic + ROS 2 Jazzy +
  #   ros_gz bridge + noVNC web UI (the entrypoint launches all of them).
  # ---------------------------------------------------------------- #
  gazebo:
    build: ./gazebo_simulator
    environment:
      - ROS_DOMAIN_ID=42
      - WORLD_FILE=/root/.gazebo/worlds/empty.world
    ports:
      - "8080:8080"
    volumes:
      - ./gazebo_simulator/models:/root/.gazebo/models
      - ./gazebo_simulator/worlds:/root/.gazebo/worlds
    networks:
      - ros_net

networks:
  ros_net:
    driver: bridge
