# Overlay that switches DDS discovery from the default Simple (multicast)
# transport to Fast DDS Discovery Server (unicast).
#
# Why use this overlay:
#   Multicast across Docker bridge networks is unreliable - some kernels and
#   most Docker Desktop VMs drop the IGMP packets that Simple discovery relies
#   on, leaving the three ROS 2 nodes unable to find each other (no error, no
#   logs, the topic graph is just empty).
#
#   This overlay adds a small `discovery_server` sidecar (the same Fast DDS
#   binary already shipped in ros-jazzy) and points every ROS node at it via
#   ROS_DISCOVERY_SERVER. Discovery becomes pure TCP/UDP unicast, which is
#   exactly what Docker bridges forward reliably.
#
#   Note: keyboard_controller is NOT a ROS node (it is a TCP client of
#   ros_bridge), so it is intentionally absent here - only the ROS nodes
#   (ros_bridge, control_logic, gazebo) need discovery settings.
#
# How to use:
#   docker compose -f docker-compose.yml -f docker-compose.discovery.yml up -d
#   # ...or start the discovery-only stack:
#   docker compose -f docker-compose.yml -f docker-compose.discovery.yml \
#     up -d discovery_server ros_bridge control_logic gazebo
#
# Notes:
#   - Fast DDS Discovery Server listens on UDP 11811 by default.
#   - All ROS services here use RMW_IMPLEMENTATION=rmw_fastrtps_cpp because the
#     Discovery Server feature is Fast DDS-specific.
services:
  discovery_server:
    image: ros:jazzy-ros-base
    command: >
      bash -lc "source /opt/ros/jazzy/setup.bash &&
                fastdds discovery -i 0"
    networks:
      - ros_net
    restart: unless-stopped

  ros_bridge:
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DISCOVERY_SERVER=discovery_server:11811
    depends_on:
      - discovery_server

  control_logic:
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DISCOVERY_SERVER=discovery_server:11811
      # Make this container a Discovery Server SUPER_CLIENT. A plain CLIENT only
      # learns about endpoints it is matched with, so graph-introspection tools
      # (`ros2 topic list` / `ros2 topic info` / `ros2 topic echo`) - and the
      # ros2 daemon they share - see an empty/partial graph and report topics or
      # publishers as missing even when pub/sub itself works. control_logic is
      # where the integration tests exec all their ros2 CLI checks, so it must be
      # a SUPER_CLIENT to observe the whole system.
      - ROS_SUPER_CLIENT=TRUE
    depends_on:
      - discovery_server

  gazebo:
    environment:
      - RMW_IMPLEMENTATION=rmw_fastrtps_cpp
      - ROS_DISCOVERY_SERVER=discovery_server:11811
    depends_on:
      - discovery_server
